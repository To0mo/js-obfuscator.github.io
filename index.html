<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JS Obfuscator</title>
    <!-- CodeMirror & Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fira+Mono:wght@400;500;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/codemirror.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/codemirror.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/mode/javascript/javascript.min.js"></script>

    <style>
        /* ベース・スクロールバー */
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        ::-webkit-scrollbar {
            width: 10px;
            height: 10px;
        }

        ::-webkit-scrollbar-track {
            background: #0E0E0E;
        }

        ::-webkit-scrollbar-thumb {
            background: #2A2A2A;
            border: 2px solid #0E0E0E;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: #404040;
        }

        /* OS標準UIを完全廃止したカスタム・チェックボックス */
        input[type="checkbox"] {
            -webkit-appearance: none;
            appearance: none;
            width: 14px;
            height: 14px;
            background: #1A1A1A;
            border: 1px solid #333333;
            cursor: pointer;
            position: relative;
            border-radius: 2px;
        }

        input[type="checkbox"]:checked {
            background: #EDEDED;
            border-color: #EDEDED;
        }

        input[type="checkbox"]:checked::after {
            content: '';
            position: absolute;
            top: 1px;
            left: 4px;
            width: 4px;
            height: 8px;
            border: solid #0E0E0E;
            border-width: 0 2px 2px 0;
            transform: rotate(45deg);
        }

        /* OS標準UIを完全廃止したカスタム・スライダー */
        input[type="range"] {
            -webkit-appearance: none;
            appearance: none;
            width: 100%;
            height: 4px;
            background: #2A2A2A;
            cursor: pointer;
            outline: none;
        }

        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 8px;
            height: 16px;
            background: #EDEDED;
            cursor: ew-resize;
        }

        /* エディタのシンタックスハイライト (VS Code風ダークソリッド) */
        .cm-s-solid.CodeMirror {
            position: absolute;
            top: 0;
            bottom: 0;
            left: 0;
            right: 0;
            height: 100% !important;
            width: 100% !important;
            background: #141414;
            color: #D4D4D4;
            font-family: 'Fira Mono', monospace;
            font-size: 13px;
        }

        .cm-s-solid .CodeMirror-gutters {
            background: #141414;
            border-right: 1px solid #1F1F1F;
        }

        .cm-s-solid .CodeMirror-linenumber {
            color: #555555;
        }

        .cm-s-solid .CodeMirror-cursor {
            border-left: 2px solid #EDEDED;
        }

        .cm-s-solid .cm-keyword {
            color: #569CD6;
        }

        .cm-s-solid .cm-operator {
            color: #D4D4D4;
        }

        .cm-s-solid .cm-variable-2 {
            color: #9CDCFE;
        }

        .cm-s-solid .cm-variable-3,
        .cm-s-solid .cm-type {
            color: #4EC9B0;
        }

        .cm-s-solid .cm-builtin {
            color: #4FC1FF;
        }

        .cm-s-solid .cm-atom {
            color: #569CD6;
        }

        .cm-s-solid .cm-number {
            color: #B5CEA8;
        }

        .cm-s-solid .cm-def {
            color: #DCDCAA;
        }

        .cm-s-solid .cm-string,
        .cm-s-solid .cm-string-2 {
            color: #CE9178;
        }

        .cm-s-solid .cm-comment {
            color: #6A9955;
        }

        .cm-s-solid .cm-property {
            color: #9CDCFE;
        }

        .cm-s-solid .CodeMirror-matchingbracket {
            color: #FFFFFF;
            border-bottom: 1px solid #569CD6;
        }

        .cm-s-solid .CodeMirror-selected {
            background: #264F78;
        }

        .CodeMirror-focused .CodeMirror-selected {
            background: #264F78;
        }
    </style>
</head>

<body
    class="bg-[#0E0E0E] text-[#A1A1A1] font-sans selection:bg-[#264F78] h-screen overflow-hidden flex flex-col relative">

    <!-- トップヘッダー -->
    <header
        class="h-14 border-b border-[#1F1F1F] bg-[#141414] shadow-md flex items-center justify-between px-6 shrink-0 z-50">
        <div class="flex items-center gap-3">
            <div class="w-3 h-3 bg-[#4EC9B0] rounded-sm shadow-[0_0_8px_rgba(78,201,176,0.5)]"></div>
            <h1 class="text-sm font-bold text-[#EDEDED] tracking-widest">JS OBFUSCATOR PRO</h1>
        </div>
        <div class="flex items-center gap-4">
            <span id="statsLabel"
                class="text-xs font-mono text-[#7A7A7A] bg-[#0E0E0E] px-3 py-1 rounded-md border border-[#1F1F1F]">Size:
                0 B -> 0 B</span>
            <button id="testRunBtn"
                class="border border-[#333333] bg-[#0E0E0E] text-[#EDEDED] px-4 py-1.5 text-xs font-medium hover:bg-[#1A1A1A] active:bg-[#2A2A2A] transition-colors rounded-md shadow-sm">Test
                Run</button>
            <button id="copyBtn"
                class="border border-[#333333] bg-[#0E0E0E] text-[#EDEDED] px-4 py-1.5 text-xs font-medium hover:bg-[#1A1A1A] active:bg-[#2A2A2A] transition-colors rounded-md shadow-sm">Copy
                Output</button>
            <button id="obfuscateBtn"
                class="bg-[#EDEDED] text-[#0E0E0E] px-6 py-1.5 text-xs font-bold hover:bg-[#D4D4D4] active:bg-[#A1A1A1] transition-colors rounded-md shadow-sm disabled:bg-[#333333] disabled:text-[#7A7A7A]">OBFUSCATE</button>
        </div>
    </header>

    <!-- メインコンテンツ (全体スクロール) -->
    <main class="flex-1 overflow-y-auto p-6 flex flex-col gap-6 relative z-0">

        <!-- 上段：Input(左) / Output(中央) / Log(右) -->
        <div class="grid grid-cols-1 lg:grid-cols-3 gap-6 h-[60vh] min-h-[400px] shrink-0">
            <!-- 左: Input エディタ -->
            <div
                class="bg-[#141414] border border-[#1F1F1F] rounded-xl shadow-lg flex flex-col overflow-hidden relative">
                <div class="px-5 py-3 border-b border-[#1F1F1F] bg-[#1A1A1A] flex items-center justify-between z-10">
                    <span class="text-xs font-bold text-[#D4D4D4] uppercase tracking-widest">input.js</span>
                </div>
                <div class="flex-1 relative" id="editorInputContainer"></div>
            </div>

            <!-- 中央: Output エディタ -->
            <div
                class="bg-[#141414] border border-[#1F1F1F] rounded-xl shadow-lg flex flex-col overflow-hidden relative">
                <div class="px-5 py-3 border-b border-[#1F1F1F] bg-[#1A1A1A] flex items-center justify-between z-10">
                    <span class="text-xs font-bold text-[#D4D4D4] uppercase tracking-widest">output.js</span>
                </div>
                <div class="flex-1 relative" id="editorOutputContainer"></div>
            </div>

            <!-- 右: Console Log -->
            <div
                class="bg-[#141414] border border-[#1F1F1F] rounded-xl shadow-lg flex flex-col overflow-hidden relative">
                <div class="px-5 py-3 border-b border-[#1F1F1F] bg-[#1A1A1A] flex items-center justify-between z-10">
                    <span class="text-xs font-bold text-[#D4D4D4] uppercase tracking-widest">Console Logs</span>
                    <button id="clearLogBtn"
                        class="text-[10px] text-[#7A7A7A] hover:text-[#EDEDED] uppercase tracking-wider font-bold transition-colors bg-[#0E0E0E] px-3 py-1 rounded border border-[#1F1F1F]">Clear</button>
                </div>
                <div class="flex-1 overflow-y-auto p-4 font-mono text-[11px] bg-[#0E0E0E] text-[#D4D4D4] space-y-1.5 shadow-inner"
                    id="logContainer">
                    <div class="text-[#7A7A7A] italic">Ready...</div>
                </div>
            </div>
        </div>

        <!-- 下段: Protection Settings -->
        <div class="bg-[#141414] border border-[#1F1F1F] rounded-xl shadow-lg flex flex-col shrink-0 mb-6">
            <div class="px-5 py-3 border-b border-[#1F1F1F] bg-[#1A1A1A]">
                <h2 class="text-xs font-bold text-[#D4D4D4] uppercase tracking-widest">Protection Settings</h2>
            </div>
            <div class="p-6 grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6 text-xs font-medium">

                <!-- 列1 -->
                <div class="space-y-4">
                    <label class="flex items-center gap-3 cursor-pointer text-[#D4D4D4] hover:text-white"><input
                            type="checkbox" id="chkStringArray" checked> String Array</label>
                    <label class="flex items-center gap-3 cursor-pointer text-[#D4D4D4] hover:text-white"><input
                            type="checkbox" id="chkStringEncoding" checked> String Encoding</label>
                    <div class="bg-[#0E0E0E] p-3 rounded-md border border-[#1F1F1F]">
                        <div class="flex justify-between text-[#7A7A7A] mb-1"><span>Decoder Variants</span><span
                                id="valDecoderVariants">4</span></div>
                        <input type="range" id="rangeDecoderVariants" min="2" max="10" value="4">
                    </div>
                    <label class="flex items-center gap-3 cursor-pointer text-[#D4D4D4] hover:text-white"><input
                            type="checkbox" id="chkStringChunks" checked> String Chunks</label>
                    <div class="bg-[#0E0E0E] p-3 rounded-md border border-[#1F1F1F]">
                        <div class="flex justify-between text-[#7A7A7A] mb-1"><span>Chunk Size</span><span
                                id="valChunkSize">8</span></div>
                        <input type="range" id="rangeChunkSize" min="1" max="16" value="8">
                    </div>
                </div>

                <!-- 列2 -->
                <div class="space-y-4">
                    <label class="flex items-center gap-3 cursor-pointer text-[#D4D4D4] hover:text-white"><input
                            type="checkbox" id="chkSelfDefending" checked> Self Defending</label>
                    <label class="flex items-center gap-3 cursor-pointer text-[#D4D4D4] hover:text-white"><input
                            type="checkbox" id="chkProxyHook" checked> Proxy Hook Protect</label>
                    <label class="flex items-center gap-3 cursor-pointer text-[#D4D4D4] hover:text-white"><input
                            type="checkbox" id="chkPacker" checked> UTF8 RC4 Shuffle Packer</label>
                    <label class="flex items-center gap-3 cursor-pointer text-[#D4D4D4] hover:text-white"><input
                            type="checkbox" id="chkEnvBinding" checked> Environment Binding</label>
                    <label class="flex items-center gap-3 cursor-pointer text-[#D4D4D4] hover:text-white"><input
                            type="checkbox" id="chkIntegrityCheck" checked> Integrity Check</label>
                    <label class="flex items-center gap-3 cursor-pointer text-[#D4D4D4] hover:text-white"><input
                            type="checkbox" id="chkDistributedWatchers" checked> Distributed Watchers</label>
                </div>

                <!-- 列3 -->
                <div class="space-y-4">
                    <label class="flex items-center gap-3 cursor-pointer text-[#D4D4D4] hover:text-white"><input
                            type="checkbox" id="chkFragmentedLaunch" checked> Fragmented Launch</label>
                    <div class="bg-[#0E0E0E] p-3 rounded-md border border-[#1F1F1F]">
                        <div class="flex justify-between text-[#7A7A7A] mb-1"><span>Chunks</span><span
                                id="valFragmentChunks">5</span></div>
                        <input type="range" id="rangeFragmentChunks" min="2" max="60" value="5">
                    </div>
                    <div class="border-t border-[#1F1F1F] pt-4">
                        <label
                            class="flex items-center gap-3 cursor-pointer text-[#D4D4D4] hover:text-white mb-2"><input
                                type="checkbox" id="chkCFF" checked> Control Flow Flattening</label>
                        <div class="bg-[#0E0E0E] p-3 rounded-md border border-[#1F1F1F]">
                            <div class="flex justify-between text-[#7A7A7A] mb-1"><span>Probability</span><span
                                    id="valCFF">100%</span></div>
                            <input type="range" id="rangeCFF" min="1" max="100" value="100">
                        </div>
                    </div>
                </div>

                <!-- 列4 -->
                <div class="space-y-4">
                    <div class="pt-1">
                        <label
                            class="flex items-center gap-3 cursor-pointer text-[#D4D4D4] hover:text-white mb-2"><input
                                type="checkbox" id="chkDeadCode" checked> Dead Code Injection</label>
                        <div class="bg-[#0E0E0E] p-3 rounded-md border border-[#1F1F1F]">
                            <div class="flex justify-between text-[#7A7A7A] mb-1"><span>Intensity</span><span
                                    id="valDeadCode">50%</span></div>
                            <input type="range" id="rangeDeadCode" min="1" max="100" value="50">
                        </div>
                    </div>
                    <div class="border-t border-[#1F1F1F] pt-4">
                        <label
                            class="flex items-center gap-3 cursor-pointer text-[#D4D4D4] hover:text-white mb-2"><input
                                type="checkbox" id="chkOpaqueZero" checked> Opaque Zero</label>
                        <div class="bg-[#0E0E0E] p-3 rounded-md border border-[#1F1F1F]">
                            <div class="flex justify-between text-[#7A7A7A] mb-1"><span>Probability</span><span
                                    id="valOpaqueZero">30%</span></div>
                            <input type="range" id="rangeOpaqueZero" min="0" max="100" value="30">
                        </div>
                    </div>
                </div>

            </div>
        </div>
    </main>

    <!-- ローディングオーバーレイ (スピナー) -->
    <div id="loadingOverlay"
        class="fixed inset-0 bg-[#000000d9] z-[100] flex flex-col items-center justify-center hidden backdrop-blur-sm transition-opacity">
        <svg class="animate-spin h-14 w-14 text-[#4EC9B0] mb-5" xmlns="http://www.w3.org/2000/svg" fill="none"
            viewBox="0 0 24 24">
            <circle class="opacity-20" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
            <path class="opacity-90" fill="currentColor"
                d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z">
            </path>
        </svg>
        <span id="progressLabel"
            class="text-sm font-bold tracking-widest uppercase text-white mb-2">OBFUSCATING...</span>
        <span id="progressPercent" class="text-xs font-mono font-bold text-[#4EC9B0]">0%</span>
    </div>

    <!-- ライブラリ -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/terser/dist/bundle.min.js"></script>

    <script>
        const TOOL_SOURCE = document.currentScript.textContent;

        // --- エディタ初期化 (CodeMirror) ---
        let inputEditor, outputEditor;
        document.addEventListener('DOMContentLoaded', () => {
            const defaultCode = `(function() {
    'use strict';

    const AppConfig = {
        label: "TEST_MODE_DONE",
        version: "v9.9.9",
        bgColor: "#2d3436"
    };

    function initHeader() {
        const header = document.createElement('div');

        Object.assign(header.style, {
            position: 'fixed',
            top: '0',
            left: '0',
            width: '100%',
            height: '40px',
            backgroundColor: AppConfig.bgColor,
            color: '#00cec9',
            display: 'flex',
            alignItems: 'center',
            justifyContent: 'center',
            zIndex: '2147483647',
            fontFamily: 'sans-serif',
            fontSize: '16px',
            boxShadow: '0 2px 5px rgba(0,0,0,0.2)',
            pointerEvents: 'none'
        });

        header.textContent = `[ ${AppConfig.label} ] | Current Version: ${AppConfig.version}`;
        document.body.appendChild(header);
    }

    if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', initHeader);
    } else {
        initHeader();
    }
})();`;
            inputEditor = CodeMirror(document.getElementById('editorInputContainer'), {
                value: defaultCode,
                mode: "javascript",
                theme: "solid",
                lineNumbers: true,
                indentUnit: 4
            });
            outputEditor = CodeMirror(document.getElementById('editorOutputContainer'), {
                value: "// Output will appear here...",
                mode: "javascript",
                theme: "solid",
                lineNumbers: true,
                readOnly: true,
                lineWrapping: true,
                viewportMargin: 10
            });
        });

        // --- UI イベント ---
        document.getElementById('rangeCFF').addEventListener('input', e => document.getElementById('valCFF').textContent = e.target.value + '%');
        document.getElementById('rangeDeadCode').addEventListener('input', e => document.getElementById('valDeadCode').textContent = e.target.value + '%');
        document.getElementById('rangeOpaqueZero').addEventListener('input', e => document.getElementById('valOpaqueZero').textContent = e.target.value + '%');
        document.getElementById('rangeChunkSize').addEventListener('input', e => document.getElementById('valChunkSize').textContent = e.target.value);
        document.getElementById('rangeDecoderVariants').addEventListener('input', e => document.getElementById('valDecoderVariants').textContent = e.target.value);
        document.getElementById('rangeFragmentChunks').addEventListener('input', e => document.getElementById('valFragmentChunks').textContent = e.target.value);

        document.getElementById('copyBtn').addEventListener('click', () => {
            const outCode = outputEditor.getValue();
            if (!outCode || outCode.startsWith("//")) return;
            navigator.clipboard.writeText(outCode).then(() => {
                const btn = document.getElementById('copyBtn');
                const orig = btn.textContent;
                btn.textContent = "Copied!";
                btn.style.color = "#4EC9B0"; // 成功時はフラットなアクセントカラーに
                setTimeout(() => {
                    btn.textContent = orig;
                    btn.style.color = "";
                }, 2000);
            });
        });

        // --- テスト実行＆ログコンソール機能 ---
        const logContainer = document.getElementById('logContainer');

        function appendLog(type, args) {
            // 初期表示の "Ready..." を消す
            if (logContainer.querySelector('div.italic')) logContainer.innerHTML = '';

            const logEl = document.createElement('div');
            const msg = Array.from(args).map(arg => {
                if (typeof arg === 'object') {
                    try { return JSON.stringify(arg); } catch (e) { return String(arg); }
                }
                return String(arg);
            }).join(' ');

            logEl.textContent = `> ${msg}`;

            // ログの種類で色分け
            if (type === 'error') logEl.style.color = '#F48771';
            else if (type === 'warn') logEl.style.color = '#CCA700';
            else if (type === 'info') logEl.style.color = '#569CD6';

            logContainer.appendChild(logEl);
            logContainer.scrollTop = logContainer.scrollHeight; // 自動スクロール
        }

        // ログのクリア
        document.getElementById('clearLogBtn').addEventListener('click', () => {
            logContainer.innerHTML = '<div class="text-[#7A7A7A] italic">Ready...</div>';
        });

        // Test Run 実行処理
        document.getElementById('testRunBtn').addEventListener('click', () => {
            const code = outputEditor.getValue();
            if (!code || code.startsWith("//")) return;

            appendLog('info', ['--- Test Run Started ---']);

            // モジュールキャッシュの回避＆メイン環境の汚染を防ぐため、毎回新しいiframeを作成
            const iframe = document.createElement('iframe');
            iframe.style.display = 'none';
            document.body.appendChild(iframe);

            const iframeWindow = iframe.contentWindow;

            // iframe内のコンソールをフックしてログ画面に出力させる
            iframeWindow.console.log = (...args) => appendLog('log', args);
            iframeWindow.console.warn = (...args) => appendLog('warn', args);
            iframeWindow.console.error = (...args) => appendLog('error', args);
            iframeWindow.console.info = (...args) => appendLog('info', args);

            // iframe内のグローバルエラーもキャッチ
            iframeWindow.onerror = (msg, url, lineNo) => {
                appendLog('error', [`${msg} (Line: ${lineNo})`]);
            };

            // スクリプトの挿入
            const script = iframeWindow.document.createElement('script');
            script.type = 'module';
            script.textContent = code;

            try {
                iframeWindow.document.body.appendChild(script);
            } catch (e) {
                appendLog('error', [e.toString()]);
            }

            // 動的インポート（非同期）を考慮し、約1秒後にiframeごと破棄して完了
            setTimeout(() => {
                try { document.body.removeChild(iframe); } catch (e) { }
                appendLog('info', ['--- Test Run Finished ---']);
            }, 1000);
        });

        // --- コアスクリプト ---
        let appConfig = {};
        let renameMap = new Map();
        let usedNames = new Set();
        let rawStringArray = [];
        let stringArrayName = "";
        let proxyNames = [];
        let decodeConfigs = [];
        let v_Date_name = "";
        let v_Math_name = "";
        let v_Crypto_name = "";
        let v_Global_name = "";
        let v_InlineDecoder_name = "";

        const reservedNames = new Set([
            "window", "document", "console", "navigator", "location", "Object", "Array", "String", "Number", "Boolean",
            "Math", "Date", "RegExp", "Promise", "Proxy", "Symbol", "Function", "atob", "btoa", "fromCharCode", "charCodeAt",
            "setTimeout", "setInterval", "alert", "log", "info", "warn", "error", "crypto", "WebAssembly", "Uint8Array", "Uint32Array",
            // JSの予約語・リテラルを追加して衝突を防ぐ
            "break", "case", "catch", "class", "const", "continue", "debugger", "default", "delete", "do", "else", "export",
            "extends", "finally", "for", "function", "if", "import", "in", "instanceof", "new", "return", "super", "switch",
            "this", "throw", "try", "typeof", "var", "void", "while", "with", "yield", "let", "package", "private", "protected",
            "public", "static", "true", "false", "null", "undefined"
        ]);

        // --- CSPRNG ヘルパー (ツール内部用) ---
        function getRandomValue() {
    if (!globalThis.crypto?.getRandomValues) return Math.random();
    return crypto.getRandomValues(new Uint32Array(1))[0] / 0x100000000;
}
        function getRandomInt(max) {
            return Math.floor(getRandomValue() * max);
        }

        function toUtf8Bytes(str) {
    return [...new TextEncoder().encode(str)];
}

        function rotateByteLeft(value, shift) {
            shift &= 7;
            return ((value << shift) | (value >>> (8 - shift))) & 255;
        }

        function rc4Bytes(bytes, key) {
    let s = [...Array(256).keys()], j = 0, i = 0, out = [];
    for (; i < 256; i++) {
        j = (j + s[i] + key[i % key.length]) & 255;
        [s[i], s[j]] = [s[j], s[i]];
    }
    i = j = 0;
    for (let b of bytes) {
        i = (i + 1) & 255;
        j = (j + s[i]) & 255;

<!DOCTYPE html>
<html lang="ja">
<head>

    <style>
        /* ベース・スクロールバー */
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }
        ::-webkit-scrollbar { width: 10px; height: 10px; }
        ::-webkit-scrollbar-track { background: #0E0E0E; }
        ::-webkit-scrollbar-thumb { background: #2A2A2A; border: 2px solid #0E0E0E; }
        ::-webkit-scrollbar-thumb:hover { background: #404040; }

        /* OS標準UIを完全廃止したカスタム・チェックボックス */
        input[type="checkbox"] {
            -webkit-appearance: none; appearance: none;
            width: 14px; height: 14px;
            background: #1A1A1A; border: 1px solid #333333;
            cursor: pointer; position: relative; border-radius: 2px;
        }
        input[type="checkbox"]:checked { background: #EDEDED; border-color: #EDEDED; }
        input[type="checkbox"]:checked::after {
            content: ''; position: absolute; top: 1px; left: 4px;
            width: 4px; height: 8px; border: solid #0E0E0E;
            border-width: 0 2px 2px 0; transform: rotate(45deg);
        }

        /* OS標準UIを完全廃止したカスタム・スライダー */
        input[type="range"] {
            -webkit-appearance: none; appearance: none;
            width: 100%; height: 4px; background: #2A2A2A; cursor: pointer; outline: none;
        }
        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none; appearance: none;
            width: 8px; height: 16px; background: #EDEDED; cursor: ew-resize;
        }

        /* エディタのシンタックスハイライト (VS Code風ダークソリッド) */
        .cm-s-solid.CodeMirror { 
    position: absolute; top: 0; bottom: 0; left: 0; right: 0; height: 100% !important; width: 100% !important;
    background: #141414; color: #D4D4D4; font-family: 'Fira Mono', monospace; font-size: 13px; 
}
        .cm-s-solid .CodeMirror-gutters { background: #141414; border-right: 1px solid #1F1F1F; }
        .cm-s-solid .CodeMirror-linenumber { color: #555555; }
        .cm-s-solid .CodeMirror-cursor { border-left: 2px solid #EDEDED; }
        .cm-s-solid .cm-keyword { color: #569CD6; }
        .cm-s-solid .cm-operator { color: #D4D4D4; }
        .cm-s-solid .cm-variable-2 { color: #9CDCFE; }
        .cm-s-solid .cm-variable-3, .cm-s-solid .cm-type { color: #4EC9B0; }
        .cm-s-solid .cm-builtin { color: #4FC1FF; }
        .cm-s-solid .cm-atom { color: #569CD6; }
        .cm-s-solid .cm-number { color: #B5CEA8; }
        .cm-s-solid .cm-def { color: #DCDCAA; }
        .cm-s-solid .cm-string, .cm-s-solid .cm-string-2 { color: #CE9178; }
        .cm-s-solid .cm-comment { color: #6A9955; }
        .cm-s-solid .cm-property { color: #9CDCFE; }
        .cm-s-solid .CodeMirror-matchingbracket { color: #FFFFFF; border-bottom: 1px solid #569CD6; }
        .cm-s-solid .CodeMirror-selected { background: #264F78; }
        .CodeMirror-focused .CodeMirror-selected { background: #264F78; }
    </style>
</head>

                            <input type="range" id="rangeDeadCode" min="1" max="100" value="50">

    <!-- ローディングオーバーレイ (スピナー) -->
    <div id="loadingOverlay" class="fixed inset-0 bg-[#000000d9] z-[100] flex flex-col items-center justify-center hidden backdrop-blur-sm transition-opacity">

            <circle class="opacity-20" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
            <path class="opacity-90" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
        </svg>
        <span id="progressLabel" class="text-sm font-bold tracking-widest uppercase text-white mb-2">OBFUSCATING...</span>

    <!-- ライブラリ -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/terser/dist/bundle.min.js"></script>

    <script>
        const TOOL_SOURCE = document.currentScript.textContent;

        // --- エディタ初期化 (CodeMirror) ---
        let inputEditor, outputEditor;
        document.addEventListener('DOMContentLoaded', () => {
            const defaultCode = `(function() {
    'use strict';
    const AppConfig = {
        label: "TEST_MODE_ACTIVE",
        version: "v1.2.0"
    };

    function initHeader() {
        console.log(\`[ \${AppConfig.label} ] | Current Version: \${AppConfig.version}\`);
    }

    if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', initHeader);
    } else {
        initHeader();
    }
})();`;
            inputEditor = CodeMirror(document.getElementById('editorInputContainer'), {
                value: defaultCode,
                mode: "javascript",
                theme: "solid",
                lineNumbers: true,
                indentUnit: 4
            });
            outputEditor = CodeMirror(document.getElementById('editorOutputContainer'), {
                value: "// Output will appear here...",
                mode: "javascript",
                theme: "solid",
                lineNumbers: true,
                readOnly: true,
                lineWrapping: true,
                viewportMargin: 10
            });
        });

        // --- UI イベント ---
        document.getElementById('rangeCFF').addEventListener('input', e => document.getElementById('valCFF').textContent = e.target.value + '%');
        document.getElementById('rangeDeadCode').addEventListener('input', e => document.getElementById('valDeadCode').textContent = e.target.value + '%');
        document.getElementById('rangeOpaqueZero').addEventListener('input', e => document.getElementById('valOpaqueZero').textContent = e.target.value + '%');
        document.getElementById('rangeChunkSize').addEventListener('input', e => document.getElementById('valChunkSize').textContent = e.target.value);
        document.getElementById('rangeDecoderVariants').addEventListener('input', e => document.getElementById('valDecoderVariants').textContent = e.target.value);
        document.getElementById('rangeFragmentChunks').addEventListener('input', e => document.getElementById('valFragmentChunks').textContent = e.target.value);

        document.getElementById('copyBtn').addEventListener('click', () => {
            const outCode = outputEditor.getValue();
            if(!outCode || outCode.startsWith("//")) return;
            navigator.clipboard.writeText(outCode).then(() => {
                const btn = document.getElementById('copyBtn');
                const orig = btn.textContent;
                btn.textContent = "Copied!";
                btn.style.color = "#4EC9B0"; // 成功時はフラットなアクセントカラーに
                setTimeout(() => {
                    btn.textContent = orig;
                    btn.style.color = "";
                }, 2000);
            });
        });
        
        // --- テスト実行＆ログコンソール機能 ---
        const logContainer = document.getElementById('logContainer');

        function appendLog(type, args) {
            // 初期表示の "Ready..." を消す
            if (logContainer.querySelector('div.italic')) logContainer.innerHTML = '';
            
            const logEl = document.createElement('div');
            const msg = Array.from(args).map(arg => {
                if (typeof arg === 'object') {
                    try { return JSON.stringify(arg); } catch(e) { return String(arg); }
                }
                return String(arg);
            }).join(' ');
            
            logEl.textContent = `> ${msg}`;
            
            // ログの種類で色分け
            if (type === 'error') logEl.style.color = '#F48771';
            else if (type === 'warn') logEl.style.color = '#CCA700';
            else if (type === 'info') logEl.style.color = '#569CD6';
            
            logContainer.appendChild(logEl);
            logContainer.scrollTop = logContainer.scrollHeight; // 自動スクロール
        }

        // ログのクリア
        document.getElementById('clearLogBtn').addEventListener('click', () => {
            logContainer.innerHTML = '<div class="text-[#7A7A7A] italic">Ready...</div>';
        });

        // Test Run 実行処理
        document.getElementById('testRunBtn').addEventListener('click', () => {
            const code = outputEditor.getValue();
            if (!code || code.startsWith("//")) return;
            
            appendLog('info', ['--- Test Run Started ---']);
            
            // モジュールキャッシュの回避＆メイン環境の汚染を防ぐため、毎回新しいiframeを作成
            const iframe = document.createElement('iframe');
            iframe.style.display = 'none';
            document.body.appendChild(iframe);

            const iframeWindow = iframe.contentWindow;

            // iframe内のコンソールをフックしてログ画面に出力させる
            iframeWindow.console.log = (...args) => appendLog('log', args);
            iframeWindow.console.warn = (...args) => appendLog('warn', args);
            iframeWindow.console.error = (...args) => appendLog('error', args);
            iframeWindow.console.info = (...args) => appendLog('info', args);

            // iframe内のグローバルエラーもキャッチ
            iframeWindow.onerror = (msg, url, lineNo) => {
                appendLog('error', [`${msg} (Line: ${lineNo})`]);
            };

            // スクリプトの挿入
            const script = iframeWindow.document.createElement('script');
            script.type = 'module';
            script.textContent = code;

            try {
                iframeWindow.document.body.appendChild(script);
            } catch (e) {
                appendLog('error', [e.toString()]);
            }

            // 動的インポート（非同期）を考慮し、約1秒後にiframeごと破棄して完了
            setTimeout(() => {
                try { document.body.removeChild(iframe); } catch(e){}
                appendLog('info', ['--- Test Run Finished ---']);
            }, 1000);
        });

        // --- コアスクリプト ---
        let appConfig = {};
        let renameMap = new Map();
        let usedNames = new Set();
        let rawStringArray = []; 
        let stringArrayName = "";
        let proxyNames = [];
        let decodeConfigs = [];
        let v_Date_name = "";
        let v_Math_name = "";
        let v_Crypto_name = "";
        let v_wasmXor_name = "";

        const reservedNames = new Set([
            "window", "document", "console", "navigator", "location", "Object", "Array", "String", "Number", "Boolean", 
            "Math", "Date", "RegExp", "Promise", "Proxy", "Symbol", "Function", "atob", "btoa", "fromCharCode", "charCodeAt",
            "setTimeout", "setInterval", "alert", "log", "info", "warn", "error", "crypto", "WebAssembly", "Uint8Array", "Uint32Array",
            // JSの予約語・リテラルを追加して衝突を防ぐ
            "break", "case", "catch", "class", "const", "continue", "debugger", "default", "delete", "do", "else", "export", 
            "extends", "finally", "for", "function", "if", "import", "in", "instanceof", "new", "return", "super", "switch", 
            "this", "throw", "try", "typeof", "var", "void", "while", "with", "yield", "let", "package", "private", "protected", 
            "public", "static", "true", "false", "null", "undefined"
        ]);

        // --- CSPRNG ヘルパー (ツール内部用) ---
        function getRandomValue() {
            const arr = new Uint32Array(1);
            if (!globalThis.crypto || !globalThis.crypto["getRandomValues"]) return Math.random();
            globalThis.crypto["getRandomValues"](arr);
            return arr[0] / 0x100000000;
        }
        function getRandomInt(max) {
            return Math.floor(getRandomValue() * max);
        }

        function toUtf8Bytes(str) {
            return Array.from(new TextEncoder().encode(str));
        }

        function rotateByteLeft(value, shift) {
            shift &= 7;
            return ((value << shift) | (value >>> (8 - shift))) & 255;
        }

        function rc4Bytes(bytes, key) {
            const s = Array.from({ length: 256 }, (_, i) => i);
            let j = 0;
            for (let i = 0; i < 256; i++) {
                j = (j + s[i] + key[i % key["length"]]) & 255;
                [s[i], s[j]] = [s[j], s[i]];
            }
            const out = [];
            let i = 0;
            j = 0;
            for (let n = 0; n < bytes["length"]; n++) {
                i = (i + 1) & 255;
                j = (j + s[i]) & 255;
                [s[i], s[j]] = [s[j], s[i]];
                out["push"](bytes[n] ^ s[(s[i] + s[j]) & 255]);
            }
            return out;
        }

        function createShuffleOrder(length, seed) {
            const order = Array.from({ length }, (_, i) => i);
            let s = seed >>> 0;
            if (s === 0) s = 1; // 0除算・ゼロ固定化の回避
            for (let i = 0; i < length; i++) {
                s = Math.imul(s, 2654435761) >>> 0;
                // ★修正: XOR演算結果を >>> 0 で符号なし(正の数)に強制してから % を計算する
                let j = ((s ^ (s >>> 16)) >>> 0) % length;
                let k = ((s ^ i) >>> 0) % length;
                let t = order[j]; order[j] = order[k]; order[k] = t;
            }
            return order;
        }
        function packUtf8Rc4ShuffleBase122(source) {
            // 英数字(62) + 指定記号(12) + 普通の記号(21) + ギリシャ文字(24) + その他(3) = ちょうど122種類
            const poolChars = "ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789%@#¥£€$ΛΣÆŒĲ!&*+-./:;<=>?[]^_{|}~αβγδεζηθικλμνξοπρστυφχψω´¸¨";
            const pool = Array.from(poolChars).map(c => c["charCodeAt"](0));
            
            // ランダムキーでXOR暗号化

                let workerOutputLen = new TextEncoder().encode(workerOutput)["length"];
                let workerPercent = workerInputLen === 0 ? 0 : Math.round(((workerOutputLen - workerInputLen) / workerInputLen) * 100);
                let workerSign = workerPercent >= 0 ? '+' : '';
                statsLabel.textContent = `Size: ${workerInputLen} B -> ${workerOutputLen} B (${workerSign}${workerPercent}%)`;
                return;
            } catch (e) {
                outputEditor.setValue("エラーが発生しました:\n" + e.message);
                statsLabel.textContent = "Size: Error";
                console.error(e);
            } finally {
                loadingOverlay.classList.add('hidden'); // ローディング非表示
                btn.disabled = false;
            }
        });
    </script>
</body>
</html>
